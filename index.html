<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Lake View Resort - POS System</title>
    <style>
        :root {
            --primary-color: #1a3a5f;
            --accent-color: #2a5a8f;
            --light-bg: #f4f7f6;
            --dark-text: #333;
            --success-green: #2ecc71;
            --danger-red: #e74c3c;
            --kitchen-orange: #e67e22;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }

        body { display: flex; height: 100vh; width: 100vw; background-color: var(--light-bg); color: var(--dark-text); overflow: hidden; }

        /* Left Section: Menu */
        .menu-container { width: 65%; display: flex; flex-direction: column; border-right: 2px solid #ddd; height: 100%; }
        .resort-header { background-color: var(--primary-color); color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        .search-container { padding: 10px; background: #fff; }
        .search-input { width: 100%; padding: 10px; border: 2px solid #cbd5e1; border-radius: 8px; outline: none; }
        
        .tab-bar { display: flex; background: #d1d5db; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; cursor: pointer; color: var(--primary-color); font-weight: bold; }
        .tab-btn.active { background: white; border-bottom: 4px solid var(--accent-color); }

        .sub-tab-bar { display: flex; flex-wrap: wrap; background: #f1f5f9; padding: 6px; gap: 6px; border-bottom: 1px solid #e2e8f0; }
        .sub-tab-btn { padding: 6px 12px; font-size: 12px; border: 1px solid #cbd5e1; border-radius: 20px; background: white; cursor: pointer; }
        .sub-tab-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        .menu-content-wrapper { flex: 1; overflow-y: auto; background-color: #f8fafc; }
        .grid-container { padding: 15px; display: none; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .grid-container.active { display: grid; }
        .item-card { background: white; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.1s; }
        .item-card:active { transform: scale(0.96); background: #f0fdf4; }
        .item-name { display: block; font-weight: 600; font-size: 13px; margin-bottom: 5px; }
        .item-price { color: var(--accent-color); font-weight: bold; font-size: 13px; }

        /* Right Section: Order */
        .order-container { width: 35%; display: flex; flex-direction: column; background: white; height: 100%; }
        .table-selector-bar { display: flex; overflow-x: auto; background: #e2e8f0; padding: 8px; gap: 6px; }
        .table-btn { padding: 8px 12px; font-size: 13px; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; flex-shrink: 0; }
        .table-btn.selected-active { border-color: var(--primary-color); box-shadow: inset 0 0 0 2px var(--primary-color); }
        .table-btn.has-orders { background-color: var(--danger-red); color: white; }
        
        .action-btns { display: flex; gap: 8px; padding: 10px; background: #f8fafc; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; text-transform: uppercase; }
        .btn-kitchen { background-color: var(--kitchen-orange); }
        .btn-payment { background-color: var(--success-green); }

        .order-header { padding: 12px; font-weight: bold; border-bottom: 1px solid #eee; color: var(--primary-color); display: flex; justify-content: space-between; }
        .receipt-items { flex: 1; overflow-y: auto; padding: 12px; }
        .receipt-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
        .qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #bbb; background: #fff; cursor: pointer; }
        .checkout-section { padding: 15px; background: #f1f5f9; border-top: 2px solid #cbd5e1; }
        .total-row { display: flex; justify-content: space-between; font-size: 20px; font-weight: 800; color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="menu-container">
        <div class="resort-header">CASA LAKE VIEW RESORT</div>
        <div class="search-container">
            <input type="text" id="menu-search" class="search-input" placeholder="Search menu..." oninput="searchMenu()">
        </div>
        
        <div class="tab-bar" id="main-tabs-nav">
            <button id="main-food-btn" class="tab-btn active" onclick="switchMainTab('foods')">FOODS</button>
            <button id="main-drinks-btn" class="tab-btn" onclick="switchMainTab('drinks')">DRINKS</button>
        </div>

        <div id="food-sub-tabs" class="sub-tab-bar">
            <button class="sub-tab-btn active" onclick="switchFoodSubTab('breakfast')">Breakfast</button>
            <button class="sub-tab-btn" onclick="switchFoodSubTab('main-dish')">Main Dish</button>
            </div>

        <div class="menu-content-wrapper">
            <div id="search-results-view"></div>
            <div id="breakfast" class="grid-container food-grid active">
                <div class="item-card" onclick="addToOrder('Full English', 170)">
                    <span class="item-name">Full English Breakfast</span>
                    <span class="item-price">GHS 170</span>
                </div>
            </div>
            </div>
    </div>

    <div class="order-container">
        <div class="table-selector-bar" id="tables-container">
            <button class="table-btn selected-active" id="btn-T1" onclick="switchTable('T1')">T1</button>
        </div>
        <div class="action-btns">
            <button class="btn btn-kitchen" onclick="printKitchenOrder()">KITCHEN</button>
            <button class="btn btn-payment" onclick="printPaymentBill()">PAYMENT</button>
        </div>
        <div class="order-header"><span>Current Order</span><span id="active-table-title">TABLE T1</span></div>
        <div class="receipt-items" id="receipt-items-container"></div>
        <div class="checkout-section">
            <div class="total-row"><span>Total:</span><span id="grand-total">GHS 0.00</span></div>
        </div>
    </div>

    <script>
        const tableOrders = { 'T1': [] };
        let currentTable = 'T1';

        function addToOrder(name, price) {
            const activeOrder = tableOrders[currentTable];
            const existing = activeOrder.find(i => i.name === name);
            if (existing) { existing.qty += 1; } 
            else { activeOrder.push({ name, price, qty: 1 }); }
            updateReceiptDisplay();
        }

        function updateReceiptDisplay() {
            const container = document.getElementById('receipt-items-container');
            container.innerHTML = '';
            let total = 0;
            tableOrders[currentTable].forEach(item => {
                total += item.price * item.qty;
                container.innerHTML += `
                    <div class="receipt-row">
                        <div><strong>${item.name}</strong><br>
                            <button class="qty-btn" onclick="changeQty('${item.name}', -1)">-</button>
                            ${item.qty}
                            <button class="qty-btn" onclick="changeQty('${item.name}', 1)">+</button>
                        </div>
                        <div class="receipt-item-price">GHS ${(item.price * item.qty).toFixed(2)}</div>
                    </div>`;
            });
            document.getElementById('grand-total').innerText = `GHS ${total.toFixed(2)}`;
        }

        function changeQty(name, amount) {
            const list = tableOrders[currentTable];
            const item = list.find(i => i.name === name);
            if (item) {
                item.qty += amount;
                if (item.qty <= 0) tableOrders[currentTable] = list.filter(i => i.name !== name);
            }
            updateReceiptDisplay();
        }

        function switchTable(id) {
            currentTable = id;
            document.getElementById('active-table-title').innerText = `TABLE ${id}`;
            updateReceiptDisplay();
        }

        function switchMainTab(mode) { /* Logic to switch food/drink tabs */ }
        function switchFoodSubTab(id) { /* Logic to switch sub-tabs */ }
        function printKitchenOrder() { alert("Printing to Kitchen..."); }
        function printPaymentBill() { alert("Printing Bill..."); }
    </script>
</body>
</html>
