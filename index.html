<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Lake View Resort - POS System</title>
    <style>
        :root {
            --primary-color: #1a3a5f;
            --accent-color: #2a5a8f;
            --light-bg: #f4f7f6;
            --dark-text: #333;
            --success-green: #2ecc71;
            --danger-red: #e74c3c;
            --kitchen-orange: #e67e22;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body { display: flex; height: 100vh; width: 100vw; background-color: var(--light-bg); overflow: hidden; }

        /* MENU SECTION */
        .menu-container { width: 65%; display: flex; flex-direction: column; border-right: 2px solid #ddd; height: 100%; }
        .resort-header { background-color: var(--primary-color); color: white; padding: 12px; text-align: center; font-size: 22px; font-weight: bold; }
        .search-container { padding: 10px; background-color: #fff; border-bottom: 1px solid #e2e8f0; }
        .search-input { width: 100%; padding: 10px; border: 2px solid #cbd5e1; border-radius: 8px; }
        .tab-bar { display: flex; background: #d1d5db; }
        .tab-btn { flex: 1; padding: 14px; font-weight: bold; border: none; background: none; cursor: pointer; color: var(--primary-color); }
        .tab-btn.active { background: white; border-bottom: 4px solid var(--accent-color); }
        .sub-tab-bar { display: flex; flex-wrap: wrap; background: #f1f5f9; padding: 6px; gap: 6px; border-bottom: 1px solid #e2e8f0; }
        .sub-tab-btn { padding: 6px 12px; font-size: 12px; font-weight: 600; border: 1px solid #cbd5e1; border-radius: 20px; background: white; cursor: pointer; }
        .sub-tab-btn.active { background: var(--accent-color); color: white; }
        .menu-content-wrapper { flex: 1; overflow-y: auto; background-color: #f8fafc; }
        .grid-container { padding: 15px; display: none; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .grid-container.active { display: grid; }
        .item-card { background: white; border-radius: 8px; border: 1px solid #cbd5e1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; cursor: pointer; }

        /* ORDER SECTION */
        .order-container { width: 35%; display: flex; flex-direction: column; background: white; height: 100%; }
        .table-selector-bar { display: flex; overflow-x: auto; background: #e2e8f0; padding: 8px; gap: 6px; }
        .table-btn { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; }
        .table-btn.selected-active { box-shadow: inset 0 0 0 2px var(--primary-color); }
        .table-btn.has-orders { background-color: var(--danger-red); color: white; }
        .action-btns { display: flex; gap: 8px; padding: 10px; border-bottom: 2px solid #cbd5e1; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-kitchen { background-color: var(--kitchen-orange); }
        .btn-payment { background-color: var(--success-green); }
        .receipt-items { flex: 1; overflow-y: auto; padding: 12px; }
        .receipt-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding: 10px 0; }
        .qty-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #bbb; cursor: pointer; }
        .checkout-section { padding: 15px; background: #f1f5f9; border-top: 2px solid #cbd5e1; }
        .total-row { display: flex; justify-content: space-between; font-size: 21px; font-weight: 800; color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="menu-container">
        <div class="resort-header">CASA LAKE VIEW RESORT</div>
        <div class="search-container">
            <input type="text" id="menu-search" class="search-input" placeholder="Search menu..." oninput="searchMenu()">
        </div>
        <div class="tab-bar" id="main-tabs-nav">
            <button id="main-food-btn" class="tab-btn active" onclick="switchMainTab('foods')">FOODS</button>
            <button id="main-drinks-btn" class="tab-btn" onclick="switchMainTab('drinks')">DRINKS</button>
        </div>
        <div id="food-sub-tabs" class="sub-tab-bar">
            <button class="sub-tab-btn active" onclick="switchFoodSubTab('breakfast')">Breakfast</button>
            <button class="sub-tab-btn" onclick="switchFoodSubTab('starters')">Starters</button>
            <button class="sub-tab-btn" onclick="switchFoodSubTab('main-dish')">Main Dish</button>
        </div>
        <div class="menu-content-wrapper">
            <div id="search-results-view"></div>
            <div id="breakfast" class="grid-container food-grid active">
                <div class="item-card" onclick="addToOrder('Full English Breakfast', 170)"><span>Full English Breakfast</span><b>GHS 170</b></div>
            </div>
            </div>
    </div>

    <div class="order-container">
        <div class="table-selector-bar" id="tables-container">
            <button class="table-btn selected-active" id="btn-T1" onclick="switchTable('T1')">T1</button>
            <button class="table-btn add-table-btn" onclick="createNewTable()">+</button>
        </div>
        <div class="action-btns">
            <button class="btn btn-kitchen" onclick="printKitchenOrder()">Kitchen Print</button>
            <button class="btn btn-payment" onclick="printPaymentBill()">Payment Print</button>
        </div>
        <div class="receipt-items" id="receipt-items-container"></div>
        <div class="checkout-section">
            <div style="margin-bottom: 10px;">
                <label><b>Waiter/Waitress:</b></label>
                <input type="text" id="staff-name" placeholder="Enter name..." style="width: 100%; padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
            </div>
            <div style="margin-bottom: 10px;">
                <label><b>Payment Method:</b></label><br>
                <input type="radio" name="paymentMethod" value="Cash" checked> Cash 
                <input type="radio" name="paymentMethod" value="Momo" style="margin-left: 15px;"> Momo
            </div>
            <div class="total-row">
                <span>Total:</span>
                <span id="grand-total">GHS 0.00</span>
            </div>
        </div>
    </div>

    <script>
        const tableOrders = {'T1': []};
        let currentTable = 'T1';
        let usbDevice = null, usbEndpointOut = null;

        const ESC_INIT = [0x1B, 0x40], ESC_CENTER = [0x1B, 0x61, 0x01], ESC_LEFT = [0x1B, 0x61, 0x00], ESC_BOLD_ON = [0x1B, 0x45, 0x01], ESC_BOLD_OFF = [0x1B, 0x45, 0x00], ESC_FEED_AND_CUT = [0x1D, 0x56, 0x42, 0x03];

        async function sendRawToUsbPrinter(commandsArray) {
            // Simplified connection logic
            if(!usbDevice) {
                try {
                    usbDevice = await navigator.usb.requestDevice({filters: [{ classCode: 7 }]});
                    await usbDevice.open();
                    await usbDevice.selectConfiguration(1);
                    await usbDevice.claimInterface(0);
                    usbEndpointOut = 1; // Standard endpoint for many thermal printers
                } catch(e) { alert("Printer Connection Failed: " + e); return; }
            }
            
            let buffer = new Uint8Array(commandsArray.flat());
            await usbDevice.transferOut(usbEndpointOut, buffer);
        }

        async function printKitchenOrder() {
            const foodItems = tableOrders[currentTable].filter(i => i.category === 'food');
            if(foodItems.length === 0) return;

            let commands = [ESC_INIT, ESC_CENTER, ESC_BOLD_ON, "KITCHEN ORDER\n", `TABLE: ${currentTable}\n`, ESC_BOLD_OFF, new Date().toLocaleString(), "\n------------------------------------------------\n", ESC_LEFT];
            foodItems.forEach(item => {
                commands.push(ESC_BOLD_ON, `[ ] ${item.qty} x ${item.name}\n`, ESC_BOLD_OFF, `    GHS ${(item.price * item.qty).toFixed(2)}\n`);
            });
            commands.push(ESC_FEED_AND_CUT);
            await sendRawToUsbPrinter(commands);
        }

        async function printPaymentBill() {
            const staffName = document.getElementById('staff-name').value || "N/A";
            const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
            let grandTotal = 0;

            let commands = [ESC_INIT, ESC_CENTER, ESC_BOLD_ON, "CASA LAKE VIEW RESORT\n", ESC_BOLD_OFF, "CUSTOMER BILL\n", ESC_LEFT, `Staff: ${staffName}\n`, `Method: ${paymentMethod}\n`, "------------------------------------------------\n"];
            
            tableOrders[currentTable].forEach(item => {
                grandTotal += (item.price * item.qty);
                commands.push(`${item.name} (${item.qty} x ${item.price})\n`);
            });

            commands.push("------------------------------------------------\n", ESC_BOLD_ON, `TOTAL: GHS ${grandTotal.toFixed(2)}\n`, ESC_BOLD_OFF, ESC_FEED_AND_CUT);
            await sendRawToUsbPrinter(commands);
            
            tableOrders[currentTable] = [];
            updateReceiptDisplay();
        }

        function addToOrder(name, price) {
            let item = tableOrders[currentTable].find(i => i.name === name);
            if(item) item.qty++;
            else tableOrders[currentTable].push({name, price, qty: 1, category: 'food'});
            updateReceiptDisplay();
        }

        function updateReceiptDisplay() {
            const container = document.getElementById('receipt-items-container');
            container.innerHTML = '';
            let total = 0;
            tableOrders[currentTable].forEach(item => {
                total += (item.price * item.qty);
                container.innerHTML += `<div class="receipt-row"><div>${item.name} x ${item.qty}</div><div>GHS ${item.price * item.qty}</div></div>`;
            });
            document.getElementById('grand-total').innerText = `GHS ${total.toFixed(2)}`;
        }
        
        function switchTable(t) { currentTable = t; updateReceiptDisplay(); }
    </script>
</body>
</html>
