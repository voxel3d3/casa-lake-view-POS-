<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Casa Lake View POS</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f4f4f4; display: flex; gap: 20px; }
        #menu-section { flex: 2; background: white; padding: 15px; border-radius: 8px; height: 95vh; overflow-y: auto; }
        #control-section { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .section { background: white; padding: 15px; border-radius: 8px; }
        .category-header { font-weight: bold; padding: 15px; background: #eee; cursor: pointer; border: 1px solid #ddd; margin-top: 5px; }
        .category-content { display: none; padding: 10px; border: 1px solid #ddd; }
        button.item-btn { padding: 10px; margin: 4px; cursor: pointer; border: 1px solid #ccc; width: 100%; text-align: left; }
        .nav-btn { padding: 15px; width: 48%; cursor: pointer; background: #ddd; border: none; }
        .nav-btn.active { background: #4CAF50; color: white; }
        .tab-content { display: none; }
        .active { display: block; }
        .table-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .table-btn { padding: 10px; border: 1px solid #4CAF50; background: white; cursor: pointer; text-align: center; }
        .table-btn.active { border: 3px solid #000; }
        .table-btn.has-order { background: #ff4444; color: white; }
        .control-btn { padding: 10px; border: none; cursor: pointer; color: white; margin-top: 5px; width: 100%; }
        .order-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 1px solid #eee; padding: 5px; }
        @media print { body * { visibility: hidden; } #printableArea, #printableArea * { visibility: visible; } #printableArea { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body>

<div id="menu-section">
    <button class="nav-btn active" onclick="showTab('food')">FOOD</button>
    <button class="nav-btn" onclick="showTab('drinks')">DRINKS</button>
    <div id="food" class="tab-content active">
        <div class="category-header" onclick="toggleCategory('f1')">COMBO MEALS ▼</div>
        <div id="f1" class="category-content">
            <button class="item-btn" onclick="addToCart('Jollof w/ 6 wings', 120, 'food')">Jollof w/ 6 wings - 120</button>
            <button class="item-btn" onclick="addToCart('Pizza', 150, 'food')">Pizza - 150</button>
        </div>
    </div>
    <div id="drinks" class="tab-content">
        <div class="category-header" onclick="toggleCategory('d1')">SOFT DRINKS ▼</div>
        <div id="d1" class="category-content">
            <button class="item-btn" onclick="addToCart('Bottled Water', 10, 'drink')">Bottled Water - 10</button>
        </div>
    </div>
</div>

<div id="control-section">
    <div class="section">
        <h3>Tables</h3>
        <div id="tableContainer" class="table-grid"><button id="btn-T1" class="table-btn active" onclick="switchTable('T1')">T1</button></div>
        <button class="control-btn" style="background:#4CAF50;" onclick="addTable()">+ Add Table</button>
        <button class="control-btn" style="background:#f44336;" onclick="removeTable()">- Remove Table</button>
    </div>
    <div class="section">
        <h3>Order for: <span id="displayTable">T1</span></h3>
        <div id="orderList"></div>
        <h4>Total: GHS <span id="total">0</span></h4>
        <button class="control-btn" style="background:#333;" onclick="printOrder('kitchen')">Print Kitchen</button>
        <button class="control-btn" style="background:#333;" onclick="printOrder('customer')">Print Customer</button>
        <button class="control-btn" style="background:#d9534f;" onclick="printOrder('payment')">Print Payment & Clear</button>
    </div>
</div>

<div id="printableArea" style="display:none;"></div>

<script>
    let currentTable = 'T1';
    let ordersData = { 'T1': [] };

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === (t === 'food' ? 'FOOD' : 'DRINKS')));
    }
    function toggleCategory(id) {
        let el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }
    function switchTable(t) {
        currentTable = t;
        document.getElementById('displayTable').innerText = t;
        document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + t).classList.add('active');
        renderOrder();
    }
    function addToCart(name, price, type) {
        let items = ordersData[currentTable];
        let existing = items.find(i => i.name === name);
        if (existing) existing.qty++;
        else items.push({ name, price, type, qty: 1 });
        updateTableStatus();
        renderOrder();
    }
    function changeQty(index, delta) {
        let items = ordersData[currentTable];
        items[index].qty += delta;
        if (items[index].qty <= 0) items.splice(index, 1);
        updateTableStatus();
        renderOrder();
    }
    function renderOrder() {
        const list = document.getElementById('orderList');
        list.innerHTML = '';
        let total = 0;
        ordersData[currentTable].forEach((item, index) => {
            let div = document.createElement('div');
            div.className = 'order-item';
            div.innerHTML = `<span>${item.name} (${item.qty})</span> <span><button onclick="changeQty(${index}, -1)">-</button><button onclick="changeQty(${index}, 1)">+</button></span>`;
            list.appendChild(div);
            total += (item.price * item.qty);
        });
        document.getElementById('total').innerText = total;
    }
    function updateTableStatus() {
        let btn = document.getElementById('btn-' + currentTable);
        btn.classList.toggle('has-order', ordersData[currentTable].length > 0);
    }
    function printOrder(type) {
        let items = ordersData[currentTable];
        let html = `<h2>${currentTable} - ${type.toUpperCase()}</h2><ul>`;
        let total = 0;
        items.forEach(item => {
            if (type === 'kitchen' && item.type !== 'food') return;
            html += `<li>${item.name} x${item.qty} = ${item.price * item.qty}</li>`;
            total += (item.price * item.qty);
        });
        html += `</ul><h3>Total: ${total} GHS</h3>`;
        document.getElementById('printableArea').innerHTML = html;
        window.print();
        if (type === 'payment') { ordersData[currentTable] = []; updateTableStatus(); renderOrder(); }
    }
    function addTable() {
        let count = Object.keys(ordersData).length + 1;
        let tName = 'T' + count;
        ordersData[tName] = [];
        let btn = document.createElement('button');
        btn.id = 'btn-' + tName;
        btn.className = 'table-btn';
        btn.innerText = tName;
        btn.onclick = () => switchTable(tName);
        document.getElementById('tableContainer').appendChild(btn);
    }
    function removeTable() {
        let container = document.getElementById('tableContainer');
        if (container.children.length > 1) {
            let lastTable = container.lastElementChild.innerText;
            delete ordersData[lastTable];
            container.removeChild(container.lastElementChild);
            if(currentTable === lastTable) switchTable('T1');
        }
    }
</script>
</body>
</html>
