<!DOCTYPE html>
<html>
<head>
    <title>Manager Dashboard</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:20px;
        }

        .table-card{
            background:white;
            padding:15px;
            margin-bottom:15px;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,.1);
        }

        h2{
            margin:0 0 10px 0;
        }
    </style>
</head>

<body>

<div id="managerLogin"
style="
max-width:400px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
">

    <div style="text-align:center; margin-bottom:20px;">
        <img src="logo.png"
             alt="Casa Lakeview Resort"
             style="width:180px;">
    </div>

    <h2 style="text-align:center;">
        Manager Login
    </h2>

    <input
        type="text"
        id="managerUsername"
        placeholder="Username"
        style="
            width:100%;
            padding:10px;
            margin-bottom:10px;
            box-sizing:border-box;
        "
    >

    <input
        type="password"
        id="managerPassword"
        placeholder="Password"
        style="
            width:100%;
            padding:10px;
            margin-bottom:15px;
            box-sizing:border-box;
        "
    >

    <button
        onclick="loginManager()"
        style="
            width:100%;
            padding:10px;
            background:#27ae60;
            color:white;
            border:none;
            cursor:pointer;
            border-radius:5px;
        "
    >
        LOGIN
    </button>

</div>

<div id="revenueSummary"
style="
display:none;
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
font-size:18px;
font-weight:bold;
">
Today's Revenue: GHS 0.00
</div>

<div id="paymentAnalysis"
style="
display:none;
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
">
Payment Analysis Loading...
</div>

<div id="salesInsights"
style="
display:none;
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
">

    <h2>📊 SALES INSIGHTS</h2>

    Most Sold Food: Loading...<br>
    Most Sold Drink: Loading...

</div>

<div id="topWaiter"
style="
display:none;
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
">
🏆 Top Waiter Loading...
</div>

<button
id="clearDashboardBtn"
onclick="clearDashboard()"
style="
display:none;
padding:10px 20px;
background:#e74c3c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
font-weight:bold;
">
🗑 Clear Dashboard
</button>

<button
id="clearPaidTablesBtn"
onclick="clearPaidTables()"
style="
display:none;
padding:10px 20px;
background:#f39c12;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
font-weight:bold;
margin-left:10px;
">
📅 Start New Day
</button>

<div id="dashboardHeader"
style="
display:none;
text-align:center;
margin-bottom:20px;
">

    <img
    src="logo.png"
    alt="Casa Lakeview Resort"
    style="
    width:150px;
    height:auto;
    display:block;
    margin:0 auto 10px auto;
    ">

    <h1 style="
    margin:0;
    color:#2c3e50;
    ">
        CASA LAKEVIEW RESORT
    </h1>

    <p style="
    margin-top:5px;
    color:#7f8c8d;
    ">
        Manager Dashboard
    </p>

</div>

<div id="dashboard" style="display:none;">
    Loading...
</div>

<hr style="display:none;" id="paidTablesDivider">

<div
id="paidTablesHeader"
style="
display:none;
background:#2ecc71;
color:white;
padding:20px;
margin-top:25px;
margin-bottom:15px;
border-radius:12px;
font-size:28px;
font-weight:bold;
text-align:center;
letter-spacing:2px;
">
✅ PAID TABLES
</div>

<div id="completedDashboard" style="display:none;">
    Loading...
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBrsJteLnC0AJsqQN2EDD07vXQX4MBveQk",
  authDomain: "casa-lake-view-resort.firebaseapp.com",
  projectId: "casa-lake-view-resort",
  storageBucket: "casa-lake-view-resort.firebasestorage.app",
  messagingSenderId: "783691618625",
  appId: "1:783691618625:web:fe6bf67bb4585947ce69c0",
  measurementId: "G-2SLSV010SB"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function clearDashboard() {

    if(!confirm(
        "Are you sure you want to clear all dashboard records?"
    )){
        return;
    }

    db.collection("liveOrders")
    .get()
    .then((snapshot) => {

        snapshot.forEach((doc) => {

            doc.ref.delete();

        });

        alert("Dashboard cleared.");

    });

}

function clearPaidTables() {

    const proceed = confirm(
`END OF DAY REPORT

Today's Revenue:
GHS ${totalRevenue.toFixed(2)}

Paid Tables:
${paidTables}

Do you want to close the day?`
    );

    if (!proceed) {
        return;
    }

alert("Top Waiter: " + topWaiter);

alert("Top Sales: " + topSales);

alert("Most Sold Food: " + mostSoldFood);

alert("Most Sold Drink: " + mostSoldDrink);

    db.collection("dailyReports")
    .add({

        // DATE
        date: new Date().toISOString().split("T")[0],

        // SALES
        totalRevenue: totalRevenue,

        // TABLES
        paidTables: paidTables,

        // TOP WAITER / WAITRESS
        topWaiter: topWaiterName,

        topWaiterSales: topSales,

        // MOST SOLD FOOD
        mostSoldFood: mostSoldFood,

        mostSoldFoodQty: mostSoldFoodQty,

        // MOST SOLD DRINK
        mostSoldDrink: mostSoldDrink,

        mostSoldDrinkQty: mostSoldDrinkQty,

        // SAVE TIME
        createdAt: new Date().toISOString()

    })
    .then(() => {

    db.collection("completedOrders")
    .get()
    .then((snapshot) => {

        const batch = db.batch();

        snapshot.forEach((doc) => {

            batch.delete(doc.ref);

        });

        batch.commit()
        .then(() => {

            alert(
                "Daily report saved.\n\n" +
                "Paid tables cleared.\n\n" +
                "New day started successfully!"
            );

        });

    });

})
    .catch((error) => {

        alert("Error saving report: " + error.message);

    });

}

db.collection("liveOrders")
.onSnapshot((snapshot) => {

    const dashboard =
        document.getElementById("dashboard");

    dashboard.innerHTML = "";

    snapshot.forEach((doc) => {

        const data = doc.data();

if(data.paymentMethod === "Cash"){

    foodCash += Number(data.total || 0);

}

if(data.paymentMethod === "Momo"){

    foodMomo += Number(data.total || 0);

}

        let ordersHTML = "";

        if (data.orders) {

            data.orders.forEach(order => {

                ordersHTML += `
                    <li>
                        ${order.name}
                        x${order.qty}
                        - ${order.createdBy}
                    </li>
                `;

            });
        }

        dashboard.innerHTML += `
            <div class="table-card">

                <h2>Table ${doc.id}</h2>

                <ul>
                    ${ordersHTML}
                </ul>

            </div>
        `;
    });

});

let totalRevenue = 0;
let paidTables = 0;

db.collection("completedOrders")
.onSnapshot((snapshot) => {

totalRevenue = 0;
paidTables = 0;

let foodSales = {};
let drinkSales = {};

let foodCash = 0;
let foodMomo = 0;

let drinksCash = 0;
let drinksMomo = 0;

let waiterSales = {};

    const completed =
        document.getElementById("completedDashboard");

    completed.innerHTML = "";

    snapshot.forEach((doc) => {

        const data = doc.data();

console.log("Payment:", data.paymentMethod);
console.log("Total:", data.total);

console.log(data);

paidTables++;

totalRevenue += Number(data.total || 0);

const waiterName =
    data.waiter || "Unknown";

if (!waiterSales[waiterName]) {
    waiterSales[waiterName] = 0;
}

waiterSales[waiterName] +=
    Number(data.total || 0);

if(data.orders){

    data.orders.forEach(item => {

        const itemTotal =
            (item.price || 0) *
            (item.qty || 0);

        const category =
            (item.category || "").toLowerCase();

        if(category === "food"){

            if(data.paymentMethod === "Cash"){
                foodCash += itemTotal;
            }

            if(data.paymentMethod === "Momo"){
                foodMomo += itemTotal;
            }

        }

        if(category === "drink"){

            if(data.paymentMethod === "Cash"){
                drinksCash += itemTotal;
            }

            if(data.paymentMethod === "Momo"){
                drinksMomo += itemTotal;
            }

        }

    });

}

        let ordersHTML = "";

        if (data.orders) {

    data.orders.forEach(order => {

        ordersHTML += `
            <li>
                ${order.name}
                x${order.qty}
            </li>
        `;

        // COUNT FOOD SALES
        if ((order.category || "").toLowerCase() === "food") {

            if (!foodSales[order.name]) {
                foodSales[order.name] = 0;
            }

            foodSales[order.name] += Number(order.qty || 0);
        }

        // COUNT DRINK SALES
        if ((order.category || "").toLowerCase() === "drink") {

            if (!drinkSales[order.name]) {
                drinkSales[order.name] = 0;
            }

            drinkSales[order.name] += Number(order.qty || 0);
        }

    });
}

        completed.innerHTML += `
            <div class="table-card">

                <h2>Table ${data.table}</h2>

                <p>
                    Paid At:
                    ${data.paidAt || ""}
                </p>

<p>
    Waiter/Waitress:
    <b>${data.waiter || "Not Recorded"}</b>
</p>

                <p>
                    Total:
                    GHS ${data.total || 0}
                </p>

                <ul>
                    ${ordersHTML}
                </ul>

            </div>
        `;

    });
document.getElementById("revenueSummary").innerHTML = `
        Today's Revenue: GHS ${totalRevenue.toFixed(2)}
        <br>
        Paid Tables: ${paidTables}
    `;

let mostSoldFood = "None";
let mostSoldFoodQty = 0;

for (let food in foodSales) {

    if (foodSales[food] > mostSoldFoodQty) {

        mostSoldFoodQty = foodSales[food];
        mostSoldFood = food;
    }
}

let mostSoldDrink = "None";
let mostSoldDrinkQty = 0;

for (let drink in drinkSales) {

    if (drinkSales[drink] > mostSoldDrinkQty) {

        mostSoldDrinkQty = drinkSales[drink];
        mostSoldDrink = drink;
    }
}

document.getElementById("salesInsights").innerHTML = `
    <h2>📊 SALES INSIGHTS</h2>

    <p>
        🏆 <b>Most Sold Food:</b><br>
        ${mostSoldFood}
        (${mostSoldFoodQty} sold)
    </p>

    <p>
        🥤 <b>Most Sold Drink:</b><br>
        ${mostSoldDrink}
        (${mostSoldDrinkQty} sold)
    </p>
`;

const foodTotal =
    foodCash + foodMomo;

const drinksTotal =
    drinksCash + drinksMomo;

const overallTotal =
    foodTotal + drinksTotal;

document.getElementById("paymentAnalysis").innerHTML = `

<div style="
background:#f8f9fa;
padding:15px;
border-radius:10px;
">

<h2>💰 PAYMENT ANALYSIS</h2>

<hr>

<h3>🍕 FOOD SALES</h3>

Food Cash:
<b>GHS ${foodCash.toFixed(2)}</b><br>

Food Momo:
<b>GHS ${foodMomo.toFixed(2)}</b><br>

Food Total:
<b>GHS ${foodTotal.toFixed(2)}</b>

<hr>

<h3>🥤 DRINK SALES</h3>

Drinks Cash:
<b>GHS ${drinksCash.toFixed(2)}</b><br>

Drinks Momo:
<b>GHS ${drinksMomo.toFixed(2)}</b><br>

Drinks Total:
<b>GHS ${drinksTotal.toFixed(2)}</b>

<hr>

<h2>
OVERALL TOTAL:
GHS ${overallTotal.toFixed(2)}
</h2>

</div>
`;

let topWaiterName = "";

let topSales = 0;

for (let waiter in waiterSales) {

    if (waiterSales[waiter] > topSales) {

        topSales = waiterSales[waiter];
        topWaiterName = waiter;
    }
}

document.getElementById("topWaiter").innerHTML = `
    <div style="
        text-align:center;
    ">

        <h2>
            🏆 TOP WAITER / WAITRESS
        </h2>

        <h1 style="
            color:#27ae60;
            margin:10px 0;
        ">
            ${topWaiterName || "No Sales Yet"}
        </h1>

        <p style="
            font-size:18px;
        ">
            Total Sales:
            <b>
                GHS ${topSales.toFixed(2)}
            </b>
        </p>

    </div>
`;

});

function loginManager() {

    const username =
        document.getElementById("managerUsername").value;

    const password =
        document.getElementById("managerPassword").value;

    if (
        username === "kingpin" &&
        password === "king3."
    ) {

        document.getElementById("managerLogin")
            .style.display = "none";

        document.getElementById("revenueSummary")
            .style.display = "block";

        document.getElementById("paymentAnalysis")
            .style.display = "block";

        document.getElementById("salesInsights")
            .style.display = "block";

        document.getElementById("topWaiter")
            .style.display = "block";

        document.getElementById("clearDashboardBtn")
            .style.display = "inline-block";

        document.getElementById("clearPaidTablesBtn")
            .style.display = "inline-block";

document.getElementById("dashboardHeader")
    .style.display = "block";

        document.getElementById("dashboard")
            .style.display = "block";

        document.getElementById("paidTablesDivider")
            .style.display = "block";

        document.getElementById("paidTablesHeader")
            .style.display = "block";

        document.getElementById("completedDashboard")
            .style.display = "block";

    } else {

        alert("Invalid Username or Password");

    }
}

</script>

</body>
</html>
