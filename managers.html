<!DOCTYPE html>
<html>
<head>
    <title>Manager Dashboard</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:20px;
        }

        .table-card{
            background:white;
            padding:15px;
            margin-bottom:15px;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,.1);
        }

        h2{
            margin:0 0 10px 0;
        }
    </style>
</head>

<body>

<div style="text-align:center; margin-bottom:20px;">

    <img
    src="logo.png"
    alt="Company Logo"
    style="
    width:120px;
    height:auto;
    display:block;
    margin:0 auto 10px auto;
    ">

    <h1 style="margin:0;">
        Live Orders Dashboard
    </h1>

</div>

<div id="revenueSummary"
style="
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
font-size:18px;
font-weight:bold;
">
Today's Revenue: GHS 0.00
</div>

<div id="paymentAnalysis"
style="
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
">
Payment Analysis Loading...
</div>

<button onclick="clearDashboard()"
style="
padding:10px 20px;
background:#e74c3c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
font-weight:bold;
">
🗑 Clear Dashboard
</button>

<button onclick="clearPaidTables()"
style="
padding:10px 20px;
background:#f39c12;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-bottom:20px;
font-weight:bold;
margin-left:10px;
">
📅 Start New Day
</button>

<div id="dashboard">
Loading...
</div>

<hr>

<div
style="
background:#2ecc71;
color:white;
padding:20px;
margin-top:25px;
margin-bottom:15px;
border-radius:12px;
font-size:28px;
font-weight:bold;
text-align:center;
letter-spacing:2px;
">
✅ PAID TABLES
</div>

<div id="completedDashboard">
Loading...
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBrsJteLnC0AJsqQN2EDD07vXQX4MBveQk",
  authDomain: "casa-lake-view-resort.firebaseapp.com",
  projectId: "casa-lake-view-resort",
  storageBucket: "casa-lake-view-resort.firebasestorage.app",
  messagingSenderId: "783691618625",
  appId: "1:783691618625:web:fe6bf67bb4585947ce69c0",
  measurementId: "G-2SLSV010SB"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function clearDashboard() {

    if(!confirm(
        "Are you sure you want to clear all dashboard records?"
    )){
        return;
    }

    db.collection("liveOrders")
    .get()
    .then((snapshot) => {

        snapshot.forEach((doc) => {

            doc.ref.delete();

        });

        alert("Dashboard cleared.");

    });

}

function clearPaidTables() {

    if(!confirm(
        "Start a new day? This will clear all paid table records."
    )){
        return;
    }

    db.collection("completedOrders")
    .get()
    .then((snapshot) => {

        snapshot.forEach((doc) => {

            doc.ref.delete();

        });

        alert("Paid tables cleared. New day started.");

    });

}

db.collection("liveOrders")
.onSnapshot((snapshot) => {

    const dashboard =
        document.getElementById("dashboard");

    dashboard.innerHTML = "";

    snapshot.forEach((doc) => {

        const data = doc.data();

if(data.paymentMethod === "Cash"){

    foodCash += Number(data.total || 0);

}

if(data.paymentMethod === "Momo"){

    foodMomo += Number(data.total || 0);

}

        let ordersHTML = "";

        if (data.orders) {

            data.orders.forEach(order => {

                ordersHTML += `
                    <li>
                        ${order.name}
                        x${order.qty}
                        - ${order.createdBy}
                    </li>
                `;

            });
        }

        dashboard.innerHTML += `
            <div class="table-card">

                <h2>Table ${doc.id}</h2>

                <ul>
                    ${ordersHTML}
                </ul>

            </div>
        `;
    });

});

db.collection("completedOrders")
.onSnapshot((snapshot) => {

    let totalRevenue = 0;
    let paidTables = 0;

let foodCash = 0;
let foodMomo = 0;

let drinksCash = 0;
let drinksMomo = 0;

    const completed =
        document.getElementById("completedDashboard");

    completed.innerHTML = "";

    snapshot.forEach((doc) => {

        const data = doc.data();

console.log("Payment:", data.paymentMethod);
console.log("Total:", data.total);

console.log(data);

paidTables++;

totalRevenue += Number(data.total || 0);

if(data.orders){

    data.orders.forEach(item => {

        const itemTotal =
            (item.price || 0) *
            (item.qty || 0);

        const category =
            (item.category || "").toLowerCase();

        if(category === "food"){

            if(data.paymentMethod === "Cash"){
                foodCash += itemTotal;
            }

            if(data.paymentMethod === "Momo"){
                foodMomo += itemTotal;
            }

        }

        if(category === "drink"){

            if(data.paymentMethod === "Cash"){
                drinksCash += itemTotal;
            }

            if(data.paymentMethod === "Momo"){
                drinksMomo += itemTotal;
            }

        }

    });

}

        let ordersHTML = "";

        if (data.orders) {

            data.orders.forEach(order => {

                ordersHTML += `
                    <li>
                        ${order.name}
                        x${order.qty}
                    </li>
                `;

            });
        }

        completed.innerHTML += `
            <div class="table-card">

                <h2>Table ${data.table}</h2>

                <p>
                    Paid At:
                    ${data.paidAt || ""}
                </p>

                <p>
                    Total:
                    GHS ${data.total || 0}
                </p>

                <ul>
                    ${ordersHTML}
                </ul>

            </div>
        `;
    });
document.getElementById("revenueSummary").innerHTML = `
        Today's Revenue: GHS ${totalRevenue.toFixed(2)}
        <br>
        Paid Tables: ${paidTables}
    `;

const foodTotal =
    foodCash + foodMomo;

const drinksTotal =
    drinksCash + drinksMomo;

const overallTotal =
    foodTotal + drinksTotal;

document.getElementById("paymentAnalysis").innerHTML = `

<div style="
background:#f8f9fa;
padding:15px;
border-radius:10px;
">

<h2>💰 PAYMENT ANALYSIS</h2>

<hr>

<h3>🍕 FOOD SALES</h3>

Food Cash:
<b>GHS ${foodCash.toFixed(2)}</b><br>

Food Momo:
<b>GHS ${foodMomo.toFixed(2)}</b><br>

Food Total:
<b>GHS ${foodTotal.toFixed(2)}</b>

<hr>

<h3>🥤 DRINK SALES</h3>

Drinks Cash:
<b>GHS ${drinksCash.toFixed(2)}</b><br>

Drinks Momo:
<b>GHS ${drinksMomo.toFixed(2)}</b><br>

Drinks Total:
<b>GHS ${drinksTotal.toFixed(2)}</b>

<hr>

<h2>
OVERALL TOTAL:
GHS ${overallTotal.toFixed(2)}
</h2>

</div>
`;

});

</script>

</body>
</html>
